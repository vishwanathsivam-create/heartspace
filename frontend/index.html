<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>HeartSpace 💕</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', sans-serif; background: #fff0f5; min-height: 100vh; }
    header { background: #ff6b9d; color: white; padding: 20px; text-align: center; }
    header h1 { font-size: 2rem; }
    header p { font-size: 0.9rem; opacity: 0.9; }
    .container { max-width: 800px; margin: 30px auto; padding: 0 20px; }
    .form-card { background: white; border-radius: 16px; padding: 24px; margin-bottom: 30px; box-shadow: 0 4px 12px rgba(255,107,157,0.15); }
    .form-card h2 { color: #ff6b9d; margin-bottom: 16px; }
    input, select, textarea { width: 100%; padding: 12px; margin-bottom: 12px; border: 2px solid #ffd6e7; border-radius: 8px; font-size: 1rem; outline: none; }
    input:focus, select:focus, textarea:focus { border-color: #ff6b9d; }
    textarea { height: 100px; resize: none; }
    button { background: #ff6b9d; color: white; border: none; padding: 12px 24px; border-radius: 8px; font-size: 1rem; cursor: pointer; width: 100%; }
    button:hover { background: #ff4785; }
    .notes-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }
    .note-card { background: white; border-radius: 16px; padding: 20px; box-shadow: 0 4px 12px rgba(255,107,157,0.15); position: relative; }
    .note-card h3 { color: #ff6b9d; margin-bottom: 8px; }
    .note-card p { color: #555; line-height: 1.5; margin-bottom: 12px; }
    .note-meta { font-size: 0.8rem; color: #aaa; }
    .delete-btn { position: absolute; top: 12px; right: 12px; background: #ffe0eb; color: #ff6b9d; border: none; border-radius: 50%; width: 28px; height: 28px; cursor: pointer; font-size: 1rem; }
    .delete-btn:hover { background: #ff6b9d; color: white; }
    .empty { text-align: center; color: #aaa; padding: 40px; }
  </style>
</head>
<body>
  <header>
    <h1>💕 HeartSpace</h1>
    <p>A private space for love notes and memories</p>
  </header>

  <div class="container">
    <div class="form-card">
      <h2>✍️ Write a note</h2>
      <input type="text" id="author" placeholder="Your name" />
      <select id="recipient">
        <option value="Everyone">Everyone 💕</option>
        <option value="Girlfriend">Girlfriend 💝</option>
        <option value="Mom">Mom 💐</option>
      </select>
      <textarea id="message" placeholder="Write your note here..."></textarea>
      <button onclick="submitNote()">Send with love 💌</button>
    </div>

    <div id="notes-container" class="notes-grid"></div>
  </div>

  <script>
    const API = `http://${window.location.hostname}:3000`;

    async function loadNotes() {
      try {
        const res = await fetch(`${API}/api/notes`);
        const data = await res.json();
        renderNotes(data.notes);
      } catch(e) {
        document.getElementById('notes-container').innerHTML = '<p class="empty">Could not load notes. Make sure backend is running.</p>';
      }
    }

    function renderNotes(notes) {
      const container = document.getElementById('notes-container');
      if (!notes.length) {
        container.innerHTML = '<p class="empty">No notes yet. Write the first one! 💕</p>';
        return;
      }
      container.innerHTML = notes.map(note => `
        <div class="note-card">
          <button class="delete-btn" onclick="deleteNote('${note.id}')">×</button>
          <h3>To: ${note.recipient} 💕</h3>
          <p>${note.message}</p>
          <div class="note-meta">From ${note.author} • ${new Date(note.createdAt).toLocaleDateString()}</div>
        </div>
      `).join('');
    }

    async function submitNote() {
      const author = document.getElementById('author').value.trim();
      const message = document.getElementById('message').value.trim();
      const recipient = document.getElementById('recipient').value;
      if (!author || !message) { alert('Please fill in all fields!'); return; }
      await fetch(`${API}/api/notes`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ author, message, recipient })
      });
      document.getElementById('author').value = '';
      document.getElementById('message').value = '';
      loadNotes();
    }

    async function deleteNote(id) {
      await fetch(`${API}/api/notes/${id}`, { method: 'DELETE' });
      loadNotes();
    }

    loadNotes();
  </script>
</body>
</html>
